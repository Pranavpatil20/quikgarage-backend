services:
  postgres:
    image: postgres:16
    container_name: quikgarage-postgres
    environment:
      POSTGRES_DB: quickgarage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - quikgarage_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quickgarage"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quikgarage_pg_data:
